# Supabase project configuration
# https://supabase.com/docs/guides/cli/config

[project]
# Set to "supabase link --project-ref <ref>" output, or fill in manually.
# project_id = "your-project-ref"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:4321"
additional_redirect_urls = ["https://localhost:4321"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.lead-nurture-email]
# Supabase Edge Function: lead-nurture-email
# Sends a nurture email via Azure Communication Services when a new lead arrives.
# Required secrets (set with `supabase secrets set`):
#   AZURE_COMMUNICATION_CONNECTION_STRING
#   AZURE_EMAIL_SENDER
#   INTERNAL_NOTIFY_EMAIL
verify_jwt = false
